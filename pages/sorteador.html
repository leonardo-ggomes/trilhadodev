<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Scrum | TrilhaDoDev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/sorteador.css">
 
</head>
<body>

    <header class="navbar">
        <a href="#" class="logo">TrilhaDoDev<span>.</span></a>
        <div style="font-weight: bold; color: var(--primary-blue);">LAYOUT DA SALA</div>
    </header>

    <main class="scrum-container">
        
        <div class="control-panel">
            <button onclick="importarAlunos()" class="btn btn-import"><i class="fa-solid fa-users"></i> 1. Nomes</button>
            <button onclick="distribuirLugares()" class="btn btn-draw"><i class="fa-solid fa-shuffle"></i> 2. Sortear</button>
            <div class="input-group">
                <label>Membros/Eq</label>
                <input type="number" id="team-size" class="input-num" value="4" min="1" max="32">
            </div>
            <button onclick="criarEquipes()" class="btn btn-teams"><i class="fa-solid fa-people-group"></i> 3. Equipes</button>
            <button onclick="resetarCores()" class="btn btn-reset"><i class="fa-solid fa-eraser"></i> Limpar</button>
        </div>

        <div class="instructor-area">
            <div class="professor-desk">
                <i class="fa-solid fa-chalkboard-user fa-2x"></i>
                <strong>ESTAÇÃO DO INSTRUTOR</strong>
            </div>
        </div>

        

        <div class="room-grid">
            <div id="col-esq"></div>
            <div id="col-dir"></div>
        </div>

        <div id="equipes-legenda" class="legend-teams"></div>

    </main>

    <footer class="main-footer">
        <p><i class="fa-solid fa-mug-hot"></i> 2026 TrilhaDoDev | Leonardo Garcia</p>
    </footer>

    <script src="../js/sorteador.js"></script>
</body>
</html>
