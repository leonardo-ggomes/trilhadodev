<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilhas de Conhecimento | Coders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="trail-page">

    <header class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">Coders<span>.</span></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="projetos.html">Projetos</a></li>
                    <li><a href="team_scrum.html">Equipe</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="trail-wrapper" id="trail-main">
        <div style="text-align: center; padding: 50px;">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color: #127894;"></i>
            <p>Carregando trilhas...</p>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-bottom">
            <p><i class="fa-solid fa-mug-hot"></i> 2026 Coders | Leonardo Garcia</p>
        </div>
    </footer>

    <script>
        async function carregarTrilhas() {
            try {
                // Certifique-se que o caminho do data.json está correto
                const response = await fetch('../data.json'); 
                const data = await response.json();
                const wrapper = document.getElementById('trail-main');
                wrapper.innerHTML = ''; // Limpa o carregando

                data.trilhas.forEach(trilha => {
                    const section = document.createElement('section');
                    section.className = 'trail-section';
                    
                    // Lógica para renderizar os itens da trilha
                    const itemsHTML = trilha.items.map(item => `
                        <div class="node-item">
                            <a href="flashcard_template.html?aula=${item.id}" class="node-btn active">
                                <i class="fa-solid ${item.icone || 'fa-code'}"></i>
                            </a>
                            <span class="node-label">${item.title}</span>
                        </div>
                    `).join('');

                    section.innerHTML = `
                        <div class="section-banner ${trilha.classe_estilo || 'logic'}">
                            <h2>${trilha.ordem}. ${trilha.secao}</h2>
                            <p>${trilha.descricao || ''}</p>
                        </div>
                        <div class="snake-container">
                            ${itemsHTML}
                        </div>
                    `;
                    wrapper.appendChild(section);
                });
            } catch (error) {
                console.error("Erro ao carregar trilhas:", error);
                document.getElementById('trail-main').innerHTML = `
                    <div style="text-align: center; color: red; padding: 50px;">
                        <i class="fa-solid fa-triangle-exclamation fa-2x"></i>
                        <p>Erro ao carregar as trilhas. Verifique o console.</p>
                    </div>`;
            }
        }

        // Inicia a função ao carregar a página
        window.onload = carregarTrilhas;
    </script>
</body>
</html>
