<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilhas de Conhecimento | TrilhaDoDev</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="trail-page">

    <header class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">TrilhaDoDev<span>.</span></a>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="projetos.html">Projetos</a></li>
                    <li><a href="team_scrum.html">Equipe</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="filter-container">
        <div class="filter-scroll" id="filter-options">
            <button class="filter-btn active" onclick="filtrar('todos')">Todas</button>
        </div>
    </div>

    <main class="trail-wrapper" id="trail-main">
        <div style="text-align: center; padding: 50px;">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x" style="color: #127894;"></i>
            <p>Carregando trilhas...</p>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-bottom">
            <p><i class="fa-solid fa-mug-hot"></i> 2026 TrilhaDoDev | Leonardo Garcia</p>
        </div>
    </footer>

    <script>
        let todasTrilhasData = []; 
        async function carregarTrilhas() {
            try {
                const response = await fetch('../data.json');
                const data = await response.json();
                todasTrilhasData = data.trilhas;

                const wrapper = document.getElementById('trail-main');
                const filterOptions = document.getElementById('filter-options');
                wrapper.innerHTML = '';

                data.trilhas.forEach((trilha, index) => {
                    // 1. Criar botão de filtro dinamicamente
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = trilha.secao;
                    btn.onclick = (e) => filtrar(trilha.secao, e.target);
                    filterOptions.appendChild(btn);

                    // 2. Criar a seção (mesmo código que você já tinha)
                    const section = document.createElement('section');
                    section.className = 'trail-section';
                    section.setAttribute('data-categoria', trilha.secao); // Para o filtro

                    const itemsHTML = trilha.items.map(item => `
                <div class="node-item">
                    <a href="flashcard.html?track=${item.id}" class="node-btn active" onclick="saveScrollPos()">
                        <i class="fa-solid ${item.icone || 'fa-code'}"></i>
                    </a>
                    <span class="node-label">${item.title}</span>
                </div>
            `).join('');

                    section.innerHTML = `
                <div class="section-banner ${trilha.classe_estilo || 'logic'}">
                    <h2>${trilha.ordem}. ${trilha.secao}</h2>
                    <p>${trilha.descricao || ''}</p>
                </div>
                <div class="snake-container">${itemsHTML}</div>
            `;
                    wrapper.appendChild(section);
                });

                // Restaurar scroll (seu código original)
                restaurarScroll();

            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        function filtrar(categoria, elemento) {
            // Atualizar botões ativos
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (elemento) {
                elemento.classList.add('active');
            } else {
                document.querySelector('.filter-btn').classList.add('active');
            }

            // Filtrar Seções
            const secoes = document.querySelectorAll('.trail-section');
            secoes.forEach(secao => {
                if (categoria === 'todos' || secao.getAttribute('data-categoria') === categoria) {
                    secao.classList.remove('hidden');
                } else {
                    secao.classList.add('hidden');
                }
            });

            // Scroll suave para o topo após filtrar
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restaurarScroll() {
            const savedScroll = localStorage.getItem('trailScrollPos');
            if (savedScroll) {
                setTimeout(() => {
                    window.scrollTo({ top: parseInt(savedScroll), behavior: 'instant' });
                    localStorage.removeItem('trailScrollPos');
                }, 100);
            }
        }

        // Função para salvar a posição antes de navegar
        function saveScrollPos() {
            localStorage.setItem('trailScrollPos', window.scrollY);
        }

        // Também salvamos se o usuário usar o botão de voltar do navegador
        window.onbeforeunload = function () {
            localStorage.setItem('trailScrollPos', window.scrollY);
        };

        window.onload = carregarTrilhas;
    </script>
</body>

</html>
